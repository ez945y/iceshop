<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>刨冰人格測驗</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=LXGW+WenKai+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2ebdc; --bg2:#e8ddc7;
  --paper:#faf5ea; --card:#fbf7ef;
  --ink:#3c372e; --ink-soft:#8b8171; --line:rgba(60,55,46,.16);
  --accent:#b45c3f;   /* 磚紅 */
  --accent-2:#c1963f; /* 芥黃 */
  --good:#6f7a58;     /* 墨綠：必吃 */
  --seal:#bb3b2e;     /* 印章紅 */
  --shadow:0 14px 34px rgba(70,55,35,.12);
  --shadow-sm:0 4px 14px rgba(70,55,35,.1);
  --radius:14px;
  --font:"Noto Sans TC","PingFang TC",system-ui,sans-serif;
  --font-brush:"LXGW WenKai TC","Noto Serif TC","PingFang TC",serif;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#24211a; --bg2:#1b1813; --paper:#2c281f; --card:#312c22;
    --ink:#ece3d2; --ink-soft:#a99f8c; --line:rgba(236,227,210,.14);
    --accent:#d47a5a; --accent-2:#d6ad5e; --good:#98a479; --seal:#d6614f;
    --shadow:0 14px 34px rgba(0,0,0,.45);
  }
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--font); color:var(--ink); font-weight:400;
  background:
    radial-gradient(circle at 1px 1px, rgba(60,55,46,.05) 1px, transparent 0) 0 0/22px 22px,
    linear-gradient(180deg,var(--bg),var(--bg2));
  background-attachment:fixed;
  min-height:100vh; overflow-x:hidden; -webkit-font-smoothing:antialiased;
}
#app{max-width:720px;margin:0 auto;padding:20px 18px 116px;}

/* ---------- 刊頭 ---------- */
.mast{text-align:center; padding:2px 0 6px}
.mast-kicker{font-size:11px; letter-spacing:5px; color:var(--ink-soft)}
.mast-title{font-family:var(--font-brush); font-weight:700; font-size:30px; color:var(--ink); margin:7px 0 10px; letter-spacing:3px}
.mast-rule{display:flex; align-items:center; justify-content:center; gap:14px}
.mast-rule::before,.mast-rule::after{content:""; height:1px; width:66px; background:var(--line)}
.seal-mark{width:30px; height:30px; border:1.5px solid var(--seal); color:var(--seal); border-radius:7px;
  display:flex; align-items:center; justify-content:center; font-family:var(--font-brush); font-size:17px; transform:rotate(-4deg)}

/* ---------- 步驟標頭 ---------- */
.step-head{margin:14px 2px 12px}
.step-line{display:flex; align-items:baseline; gap:10px}
.step-no{font-family:var(--font-brush); font-size:24px; color:var(--accent); font-weight:700; line-height:1}
.step-name{font-size:16px; font-weight:700; letter-spacing:1.5px; color:var(--ink)}
.step-sub{font-size:13px; color:var(--ink-soft); margin:6px 0 11px; letter-spacing:.3px}
.progress-line{height:3px; background:var(--line); border-radius:3px; overflow:hidden}
.progress-line i{display:block; height:100%; background:var(--accent); border-radius:3px; transition:width .35s ease}

/* ---------- 分類籤 ---------- */
.cat-tabs{display:flex; gap:2px; overflow-x:auto; padding:2px 0 12px; margin:0 -2px; scrollbar-width:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tab{flex:0 0 auto; border:none; background:none; font-family:inherit; cursor:pointer;
  color:var(--ink-soft); font-size:14px; letter-spacing:1px; padding:6px 11px 9px; position:relative; white-space:nowrap;}
.cat-tab .cc{font-size:11px; color:var(--accent); margin-left:4px; font-variant-numeric:tabular-nums; font-weight:700}
.cat-tab.is-on{color:var(--ink); font-weight:700}
.cat-tab.is-on::after{content:""; position:absolute; left:11px; right:11px; bottom:3px; height:2px; background:var(--accent); border-radius:2px}

/* ---------- 配料卡 ---------- */
.pick-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:11px;}
@media(max-width:560px){ .pick-grid{grid-template-columns:repeat(3,1fr); gap:9px} }
@media(max-width:330px){ .pick-grid{grid-template-columns:repeat(2,1fr)} }
.tile{position:relative; cursor:pointer; border:1px solid var(--line); background:var(--card);
  border-radius:12px; padding:11px 6px 9px; font-family:inherit; text-align:center;
  transition:transform .12s, border-color .15s, box-shadow .15s; box-shadow:var(--shadow-sm);}
.tile:active{transform:scale(.96)}
.tile .food{position:relative; height:54px; width:62px; margin:2px auto 7px;}
.tile .food::before{content:""; position:absolute; inset:2px 0 -2px; border-radius:50%;
  background:radial-gradient(circle at 50% 55%, rgba(60,55,46,.07), transparent 68%);}
.tile .food svg{position:relative; width:100%; height:100%; filter:drop-shadow(0 4px 4px rgba(60,45,25,.16))}
.tile .nm{font-size:12.5px; color:var(--ink); letter-spacing:.5px; font-weight:500}
.tile .cat-dot{position:absolute; left:9px; top:9px; width:6px; height:6px; border-radius:50%}
.tile .seal{position:absolute; top:6px; right:6px; width:21px; height:21px; border-radius:6px;
  display:none; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:700;
  font-family:var(--font-brush); transform:rotate(-6deg); box-shadow:0 2px 4px rgba(0,0,0,.22)}
.tile[data-picked] .seal{display:flex}
.tile[data-picked="must"]{border-color:var(--good); box-shadow:0 0 0 1.5px var(--good), var(--shadow-sm); background:linear-gradient(180deg,#f6f8ef,var(--card))}
.tile[data-picked="must"] .seal{background:var(--good)}
.tile[data-picked="ban"]{border-color:var(--seal); box-shadow:0 0 0 1.5px var(--seal), var(--shadow-sm)}
.tile[data-picked="ban"] .food{filter:grayscale(.5) opacity(.6)}
.tile[data-picked="ban"] .seal{background:var(--seal)}

/* ================= 底部固定列：你的碗 + 進度 + 下一步 ================= */
@keyframes drop{0%{transform:translate(-50%,-160%) scale(.6);opacity:0}60%{opacity:1}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
.bowl-toppings{position:absolute; inset:0; pointer-events:none}
.bt{position:absolute; transform:translate(-50%,-50%); animation:drop .45s cubic-bezier(.3,1.5,.5,1)}
.bt svg{width:100%; height:100%; filter:drop-shadow(0 2px 2px rgba(60,45,25,.25))}

.tray-bar{position:fixed; left:0; right:0; bottom:0; z-index:30;
  padding:10px 16px calc(12px + env(safe-area-inset-bottom));
  background:linear-gradient(180deg,rgba(242,235,220,0),var(--bg) 42%);}
.tray-inner{max-width:720px; margin:0 auto; display:flex; align-items:center; gap:13px;
  background:var(--paper); border:1px solid var(--line); border-radius:16px;
  padding:8px 10px 8px 12px; box-shadow:var(--shadow);}
.tray-bowl{position:relative; width:64px; flex:0 0 64px}
.tray-bowl .bowl-svg{width:100%; display:block; filter:drop-shadow(0 4px 5px rgba(70,55,35,.2))}
.tray-bowl .bt{width:20px; height:20px}
.tray-ban{width:64px; flex:0 0 64px; display:flex; flex-wrap:wrap; gap:3px; justify-content:center; align-content:center; min-height:40px}
.tray-ban .mb{position:relative; width:21px; height:21px; animation:drop .4s cubic-bezier(.3,1.4,.5,1)}
.tray-ban .mb svg{width:100%; height:100%; filter:grayscale(.4)}
.tray-ban .none{font-size:20px; opacity:.5}
.tray-txt{flex:1; min-width:0; line-height:1.25}
.tray-txt b{font-family:var(--font-brush); font-size:23px; color:var(--accent); font-weight:700}
.tray-txt span{font-size:12.5px; color:var(--ink-soft); letter-spacing:.3px}
.wc-cta{flex:0 0 auto; border:none; font-family:inherit; cursor:pointer; font-size:15px; font-weight:700;
  letter-spacing:2px; color:#fff; background:var(--ink); border-radius:11px; padding:12px 20px;
  transition:opacity .15s, transform .12s, background .2s}
.wc-cta:active{transform:translateY(1px)}
.wc-cta:disabled{background:var(--line); color:var(--ink-soft); cursor:not-allowed}
.wc-cta.ready{background:var(--accent)}
.wc-cta.big{font-size:17px; letter-spacing:3px; padding:14px 32px; border-radius:14px;
  animation:ctaPop .5s cubic-bezier(.3,1.5,.5,1) both}
@keyframes ctaPop{0%{opacity:0;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}

/* ================= 開場動畫 ================= */
.intro{position:relative; text-align:center; min-height:74vh; display:flex; flex-direction:column; justify-content:center; padding-top:10px}
.skip{position:absolute; top:0; right:0; border:none; background:none; color:var(--ink-soft);
  font-family:inherit; font-size:13px; letter-spacing:1px; cursor:pointer; padding:8px 4px}
.intro-stage{position:relative; width:300px; max-width:100%; height:240px; margin:0 auto}
.stage-svg{width:100%; height:100%; display:block}
.scene-in{position:absolute; inset:0; animation:sceneIn .55s ease both}
@keyframes sceneIn{0%{opacity:0; transform:translateY(10px)}100%{opacity:1; transform:none}}
.intro-cap{font-family:var(--font-brush); font-size:19px; line-height:1.95; color:var(--ink);
  letter-spacing:1px; max-width:430px; margin:20px auto 0; min-height:5.6em; padding:0 10px}
.caret{display:inline-block; width:2px; height:.95em; background:var(--accent); vertical-align:-1px; margin-left:3px; animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.intro-dots{display:flex; gap:7px; justify-content:center; margin:14px 0 10px}
.intro-dots span{width:7px; height:7px; border-radius:50%; background:var(--line); transition:.35s}
.intro-dots span.on{background:var(--accent); width:22px; border-radius:4px}
.intro-cta-wrap{min-height:56px; display:flex; justify-content:center; align-items:center}

/* 幕內插畫 */
.fbowl{position:absolute; left:50%; bottom:4px; transform:translateX(-50%)}
.fbowl .bowl-svg{width:100%; display:block; filter:drop-shadow(0 8px 10px rgba(70,55,35,.2))}
.fbowl .bt{width:34px; height:34px}
.flake{animation:fall .9s linear infinite}
.flake.f0{animation-delay:0s}.flake.f1{animation-delay:.18s}.flake.f2{animation-delay:.36s}.flake.f3{animation-delay:.54s}.flake.f4{animation-delay:.72s}
@keyframes fall{0%{transform:translateY(0);opacity:0}15%{opacity:1}100%{transform:translateY(64px);opacity:0}}
.drop{position:absolute; width:38px; height:38px; animation:tumble .95s cubic-bezier(.3,1.4,.4,1) both}
.drop svg{width:100%; height:100%; filter:drop-shadow(0 3px 3px rgba(60,45,25,.22))}
@keyframes tumble{0%{transform:translateY(-175px) rotate(-35deg);opacity:0}35%{opacity:1}78%{transform:translateY(6px) rotate(5deg)}100%{transform:translateY(0) rotate(0)}}
.d0{animation-delay:.15s}.d1{animation-delay:.4s}.d2{animation-delay:.65s}.d3{animation-delay:.9s}.d4{animation-delay:1.15s}.d5{animation-delay:1.4s}
.spoon{position:absolute; width:98px; top:42%}
.spoon svg{width:100%; filter:drop-shadow(0 3px 4px rgba(60,45,25,.25))}
.spoon.left{left:-8px; animation:spoonL 1.35s ease both}
.spoon.right{right:-8px; animation:spoonR 1.35s ease both}
@keyframes spoonL{0%{transform:translateX(-135px) rotate(12deg);opacity:0}55%{opacity:1}100%{transform:translateX(26px) rotate(5deg)}}
@keyframes spoonR{0%{transform:translateX(135px) scaleX(-1) rotate(12deg);opacity:0}55%{opacity:1}100%{transform:translateX(-26px) scaleX(-1) rotate(5deg)}}
.glow{position:absolute; left:50%; top:54%; width:230px; height:230px; transform:translate(-50%,-50%); border-radius:50%;
  background:radial-gradient(circle, rgba(224,150,50,.45), rgba(224,150,50,0) 66%); animation:pulse 1.9s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.45; transform:translate(-50%,-50%) scale(.9)}50%{opacity:.85; transform:translate(-50%,-50%) scale(1.12)}}
.spark{position:absolute; color:var(--accent-2); font-size:17px; animation:twinkle 1.5s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2; transform:scale(.7)}50%{opacity:1; transform:scale(1.15)}}

/* ================= 結果頁 ================= */
.result{max-width:440px; margin:0 auto; text-align:center}
.res-bowl{position:relative; height:180px; margin:2px auto 4px}
.res-name{font-family:var(--font-brush); font-size:33px; font-weight:700; color:var(--ink); letter-spacing:3px; line-height:1.2}
.res-tag{font-family:var(--font-brush); font-size:17px; color:var(--accent); margin:8px 0 10px; letter-spacing:1px}
.res-sub{display:inline-block; font-size:13px; color:var(--ink); background:var(--card); border:1px solid var(--line);
  border-radius:20px; padding:4px 15px; letter-spacing:1px}
.res-desc{font-size:14.5px; line-height:2; color:var(--ink); letter-spacing:.3px; margin:18px 4px 14px; text-align:justify}
.res-subdesc{font-size:13px; line-height:1.85; color:var(--ink-soft); background:var(--card); border:1px solid var(--line);
  border-radius:12px; padding:11px 15px; margin:0 0 18px; text-align:left}
.res-subdesc b{color:var(--good); font-weight:700}
.res-summary{margin:2px 0 20px}
.rs-row{display:flex; align-items:center; gap:6px; justify-content:center; flex-wrap:wrap; margin:8px 0}
.rs-k{font-family:var(--font-brush); font-size:15px; color:var(--good); width:32px; flex:0 0 32px; text-align:right; margin-right:4px}
.rs-k.ban{color:var(--seal)}
.rs-item{display:flex; flex-direction:column; align-items:center; width:46px}
.rs-item svg{width:34px; height:34px; filter:drop-shadow(0 2px 2px rgba(60,45,25,.15))}
.rs-item.off svg{filter:grayscale(.55) opacity(.7)}
.rs-item small{font-size:10px; color:var(--ink-soft); margin-top:1px; letter-spacing:.2px}
.code-card{background:linear-gradient(180deg,var(--paper),var(--card)); border:1.5px dashed var(--accent);
  border-radius:16px; padding:16px 14px; margin:4px 0 18px}
.code-label{font-size:12px; letter-spacing:4px; color:var(--ink-soft)}
.code-val{font-family:var(--font-brush); font-size:30px; letter-spacing:4px; color:var(--accent); margin:7px 0 13px; font-weight:700; user-select:all}
.code-copy{border:1px solid var(--accent); background:none; color:var(--accent); font-family:inherit; font-size:13px;
  padding:7px 22px; border-radius:20px; cursor:pointer; letter-spacing:1px; transition:.15s}
.code-copy.done{background:var(--good); border-color:var(--good); color:#fff}
.code-hint{font-size:12px; color:var(--ink-soft); margin-top:13px; line-height:1.65}
.res-actions{display:flex; flex-direction:column; gap:10px; margin-bottom:12px}
.res-actions .wc-cta{width:100%; padding:15px}
.ghost-btn{border:1px solid var(--line); background:var(--paper); color:var(--ink); font-family:inherit; font-size:14px;
  padding:12px; border-radius:12px; cursor:pointer; letter-spacing:1px; transition:.15s}
.ghost-btn:active{transform:translateY(1px)}
.ghost-btn.small{border:none; background:none; color:var(--ink-soft); font-size:13px; margin-top:2px}

/* ================= 雙人契合度 ================= */
.code-input{margin:8px 0 2px}
.code-input input{width:100%; font-family:var(--font-brush); font-size:24px; letter-spacing:3px; text-align:center;
  padding:15px 12px; border:1.5px solid var(--line); border-radius:14px; background:var(--card); color:var(--ink);
  text-transform:uppercase; -webkit-appearance:none}
.code-input input:focus{outline:none; border-color:var(--accent)}
.code-input input::placeholder{color:var(--ink-soft); opacity:.45; letter-spacing:2px}
.code-err{color:var(--seal); font-size:13px; min-height:20px; margin-top:9px; text-align:center; line-height:1.5}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.compat-hero{text-align:center; margin:6px 0 8px; padding:22px 14px 20px; background:var(--card);
  border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow-sm)}
.ch-bowls{display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:12px}
.chb{text-align:center; width:96px}
.chb-bowl{width:96px; margin:0 auto}
.mbowl{position:relative; width:100%}
.mbowl .bowl-svg{width:100%; display:block; filter:drop-shadow(0 4px 5px rgba(70,55,35,.18))}
.mbowl .bt{width:17px; height:17px}
.chb span{display:block; font-size:12px; color:var(--ink); font-weight:700; letter-spacing:.5px; margin-top:2px}
.chb-vs{font-family:var(--font-brush); font-size:20px; color:var(--accent); align-self:center; padding-bottom:18px}
.ch-level{font-family:var(--font-brush); font-size:38px; font-weight:700; color:var(--accent); letter-spacing:4px; line-height:1.1}
.ch-range{font-size:12px; color:var(--ink-soft); letter-spacing:2px; margin-top:6px}
.ch-meter{font-size:17px; letter-spacing:5px; color:var(--accent); margin-top:14px}
.ch-meter b{font-family:var(--font-brush); font-size:15px; letter-spacing:1px; margin-left:6px}
.landmine{font-size:13px; line-height:1.85; color:var(--ink-soft); background:linear-gradient(180deg,var(--paper),var(--card));
  border:1px dashed var(--accent-2); border-radius:12px; padding:12px 15px; margin:0 0 18px; text-align:left}
.landmine b{color:var(--accent-2); font-weight:700}

/* ---------- 手機微調 ---------- */
@media(max-width:480px){
  #app{padding:16px 14px 106px}
  .res-name{font-size:28px}
  .code-val{font-size:26px}
  .ch-level{font-size:32px}
  .mast-title{font-size:26px}
  .tray-inner{gap:10px; padding:7px 9px 7px 11px}
  .tray-bowl,.tray-ban{width:56px; flex-basis:56px}
  .tray-txt b{font-size:20px}
  .wc-cta{font-size:14px; padding:11px 16px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";

/* ============ 配料資料 (27 種 / 5 類) ============ */
const CATS = [
  {key:"sauce",   name:"醬汁與糖水"},
  {key:"bean",    name:"豆穀類"},
  {key:"chewy",   name:"嚼勁類"},
  {key:"jelly",   name:"果凍類"},
  {key:"produce", name:"農產類"},
];
const TOPPINGS = [
  {id:0, cat:"sauce",   name:"黑糖水"},
  {id:1, cat:"sauce",   name:"煉乳"},
  {id:2, cat:"sauce",   name:"百香果醬"},
  {id:3, cat:"sauce",   name:"烏梅醬"},
  {id:4, cat:"sauce",   name:"巧克力醬"},
  {id:5, cat:"bean",    name:"紅豆"},
  {id:6, cat:"bean",    name:"綠豆"},
  {id:7, cat:"bean",    name:"花豆"},
  {id:8, cat:"bean",    name:"軟花生"},
  {id:9, cat:"bean",    name:"薏仁"},
  {id:10,cat:"bean",    name:"麥片"},
  {id:11,cat:"chewy",   name:"粉粿"},
  {id:12,cat:"chewy",   name:"芋圓"},
  {id:13,cat:"chewy",   name:"地瓜圓"},
  {id:14,cat:"chewy",   name:"粉圓"},
  {id:15,cat:"chewy",   name:"小湯圓"},
  {id:16,cat:"chewy",   name:"粉條"},
  {id:17,cat:"jelly",   name:"仙草"},
  {id:18,cat:"jelly",   name:"愛玉"},
  {id:19,cat:"jelly",   name:"布丁"},
  {id:20,cat:"jelly",   name:"椰果"},
  {id:21,cat:"jelly",   name:"杏仁豆腐"},
  {id:22,cat:"produce", name:"蜜芋頭"},
  {id:23,cat:"produce", name:"蜜地瓜"},
  {id:24,cat:"produce", name:"蜜鳳梨"},
  {id:25,cat:"produce", name:"芒果"},
  {id:26,cat:"produce", name:"草莓"},
];

/* ============ 食物插畫 SVG（半寫實） ============ */
let _uid=0; const uid=()=>"a"+(_uid++);
const PILE=[[30,60,15],[52,52,16],[45,73,14],[68,65,14],[61,37,13],[77,47,12],[37,42,12],[22,50,11]];
const PILE_SM=[[28,54,10],[42,48,11],[38,64,10],[54,58,11],[50,44,10],[62,52,10],[64,66,9],[30,66,9],[46,72,9],[58,70,9]];
const CUBES=[[34,44,23,-8],[59,39,21,10],[46,62,24,6],[71,59,18,-12],[27,66,18,14],[65,76,16,4]];

function ballPile(light,mid,dark,opts={}){
  const pos=opts.pos||PILE, id=uid();
  const balls=pos.map(([x,y,r])=>{
    let ex="";
    if(opts.crease) ex+=`<path d="M${x-r*0.55} ${y} q ${r*0.55} ${r*0.5} ${r*1.1} 0" stroke="${opts.crease}" stroke-width="1.3" fill="none" opacity=".55"/>`;
    if(opts.speck) ex+=[[-.3,.1],[.25,-.2],[.05,.35],[.4,.25]].map(([dx,dy])=>`<circle cx="${x+r*dx}" cy="${y+r*dy}" r="${r*0.12}" fill="${opts.speck}" opacity=".7"/>`).join("");

let introTimers=[];
function clearIntro(){ introTimers.forEach(f=>f()); introTimers=[]; }
function typewriter(el,text,cb){
  el.textContent=""; let i=0;
  const iv=setInterval(()=>{ el.textContent=text.slice(0,++i); if(i>=text.length){ clearInterval(iv); cb&&cb(); } }, 52);
  introTimers.push(()=>clearInterval(iv));
}
function startQuiz(){ clearIntro(); state.screen="step1"; render(); window.scrollTo(0,0); }
function mountIntro(){
  clearIntro();
  app.innerHTML=`<div class="intro">
    <button class="skip" id="skip">跳過開場 ›</button>
    <div class="intro-stage" id="stage"></div>
    <div class="intro-cap"><span id="cap"></span><i class="caret"></i></div>
    <div class="intro-dots" id="dots">${SCENES.map(()=>`<span></span>`).join("")}</div>
    <div class="intro-cta-wrap" id="ctaWrap"></div>
  </div>`;
  document.getElementById("skip").onclick=startQuiz;
  playScene(0);
}
function playScene(i){
  const stage=document.getElementById("stage"), cap=document.getElementById("cap");
  const dots=document.getElementById("dots"), ctaWrap=document.getElementById("ctaWrap");
  if(!stage) return;
  [...dots.children].forEach((d,k)=>d.classList.toggle("on",k===i));
  ctaWrap.innerHTML="";
  stage.innerHTML=`<div class="scene-in">${SCENES[i].build()}</div>`;
  typewriter(cap, SCENES[i].text, ()=>{
    if(SCENES[i].cta){
      ctaWrap.innerHTML=`<button class="wc-cta ready big" id="start">開始製冰　❄</button>`;
      document.getElementById("start").onclick=startQuiz;
    } else {
      const t=setTimeout(()=>playScene(i+1), 1700);
      introTimers.push(()=>clearTimeout(t));
    }
  });
  // 點畫面可提前進入下一幕
  stage.onclick=()=>{ if(!SCENES[i].cta){ clearIntro(); playScene(i+1); } };
}

function subTag(ban){

/* ============ 刨冰代碼（6 碼英數）============
   純前端無後端，代碼需自帶資料。編碼「必吃 5 樣」＋「拒吃 4 樣」：
   必吃＝27 選 5（0…80729），拒吃＝剩下的 22 選 4（0…7314），各自用組合數系統排名，
   合成 combined = 必吃rank × 7315 + 拒吃rank（0…590539949），再轉 6 碼 base36。
   （6 碼 base36 容量 36^6≈21.8 億 ≫ 5.9 億；5 碼只有 6047 萬，裝不下，所以要 6 碼。）
   帶了拒吃 → 契合度能「雙向」看地雷（你的最愛落在對方地雷、對方的最愛落在你地雷）。 */
const CODE_N=27, CODE_K=5, BAN_K=4;
function nCr(n,r){ if(r<0||r>n) return 0; r=Math.min(r,n-r); let v=1; for(let i=0;i<r;i++) v=v*(n-i)/(i+1); return Math.round(v); }
const MUST_MAX=nCr(CODE_N,CODE_K);       // 80730
const BAN_MAX=nCr(CODE_N-CODE_K,BAN_K);  // 7315（必吃選完，剩 22 樣選 4）
// 組合數系統：一組「升冪排序的索引」↔ 一個序號，雙向可逆
function rankCombo(sorted){ let r=0; for(let j=0;j<sorted.length;j++) r+=nCr(sorted[j], j+1); return r; }
function unrankCombo(rank,k){ let r=rank; const combo=new Array(k);
  for(let j=k;j>=1;j--){ let a=j-1; while(nCr(a+1,j)<=r) a++; combo[j-1]=a; r-=nCr(a,j); } return combo; }
function makeCode(){
  const must=[...state.must].sort((a,b)=>a-b);
  const remaining=[]; for(let i=0;i<CODE_N;i++) if(!must.includes(i)) remaining.push(i);
  const banPos=[...state.ban].map(id=>remaining.indexOf(id)).sort((a,b)=>a-b);
  const combined=rankCombo(must)*BAN_MAX + rankCombo(banPos);
  return combined.toString(36).toUpperCase().padStart(6,"0");
}
function decodeCode(str){
  const s=String(str).trim().replace(/\s+/g,"").toLowerCase();
  if(!/^[0-9a-z]{6}$/.test(s)) return null;
  const combined=parseInt(s,36);
  if(!Number.isInteger(combined) || combined<0 || combined>=MUST_MAX*BAN_MAX) return null;
  const must=unrankCombo(Math.floor(combined/BAN_MAX), CODE_K);
  if(must.some(i=>i<0||i>26) || new Set(must).size!==CODE_K) return null;
  const mustSet=new Set(must), remaining=[];
  for(let i=0;i<CODE_N;i++) if(!mustSet.has(i)) remaining.push(i);
  const banPos=unrankCombo(combined%BAN_MAX, BAN_K);
  if(banPos.some(p=>p<0||p>=remaining.length) || new Set(banPos).size!==BAN_K) return null;
  return {must, ban:banPos.map(p=>remaining[p])};
}

// 分享：手機叫出原生分享面板（LINE / Threads / IG…都在裡面），桌機退回複製。
// 附上結果圖（有做出來才帶），失敗或不支援就只分享文字。
async function shareInvite(p, code, btn){
  const orig=btn.textContent;
  const url = /^https?:/.test(location.origin) ? location.href.split("#")[0] : "";
  const text = `我的刨冰人格是「${p.name}」🍧 來測我們一起吃冰的契合度～ 刨冰代碼：${code}`;
  btn.textContent="準備分享…"; btn.disabled=true;

  try{ const blob=await resultCardBlob(); if(blob) file=new File([blob],`刨冰人格_${code}.png`,{type:"image/png"}); }catch(e){}
  btn.disabled=false; btn.textContent=orig;
  // 1) 手機原生分享（優先帶圖）
  if(navigator.share){
    const withFile = file && navigator.canShare && navigator.canShare({files:[file]})
      ? {files:[file], text} : (url ? {title:"刨冰人格測驗", text, url} : {title:"刨冰人格測驗", text});
    try{ await navigator.share(withFile); return; }
    catch(err){ if(err && err.name==="AbortError") return; }
  }
  // 2) 桌機退路：有圖就下載圖 + 複製文字，否則只複製文字
  if(file){ const a=document.createElement("a"); a.href=URL.createObjectURL(file); a.download=file.name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),4000); }
  copyText(url ? `${text} ${url}` : text, btn, orig, file ? "已下載圖 + 複製文字 ✓" : "已複製，貼給對方 ✓");
}
// 把一段自包含 SVG 字串轉成點陣 Image（補上 xmlns/寬高，否則 data-URI 版本不同瀏覽器會載入失敗）
function svgToImage(svg, w, h){
  const s = svg.replace(/<svg /, `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" `);
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>resolve(img); img.onerror=()=>reject(new Error("svg raster failed"));
    img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(s);
  });
}
function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
// 把單人結果畫成一張分享卡（1080×1350 PNG）。固定淺色主題，分享出去長相才一致。
// 重現頁面上的「碗＋堆料」：各自把自包含 SVG 點陣化再依 MOUND 座標疊上去（不靠截圖套件，Safari 也能跑）。
async function resultCardBlob(){
  if(!(state.must && state.must.length===5)) return null;
  const p=mainPersona(state.must), s=subTag(state.ban), code=makeCode();
  const W=1080, H=1350, cx=W/2;
  const cv=document.createElement("canvas"); cv.width=W; cv.height=H;
  const ctx=cv.getContext("2d");
  await document.fonts.ready;
  try{ await Promise.all([
    document.fonts.load('700 92px "LXGW WenKai TC"'),
    document.fonts.load('700 40px "Noto Sans TC"'),
    document.fonts.load('400 40px "Noto Sans TC"'),
  ]); }catch(e){}
  ctx.fillStyle="#faf5ea"; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="rgba(60,55,46,.18)"; ctx.lineWidth=3; roundRect(ctx,30,30,W-60,H-60,26); ctx.stroke();
  ctx.textAlign="center"; ctx.textBaseline="alphabetic";
  ctx.fillStyle="#8b8171"; ctx.font='700 40px "LXGW WenKai TC","Noto Serif TC",serif';
  ctx.fillText("刨 冰 人 格 測 驗", cx, 132);
  // bowl + mounded toppings
  const BW=600, BH=BW*150/200, bx=cx-BW/2, by=196;
  try{
    const bowlImg=await svgToImage(bowlSvg(), BW*2, BH*2);
    ctx.save(); ctx.shadowColor="rgba(70,55,35,.22)"; ctx.shadowBlur=26; ctx.shadowOffsetY=14;
    ctx.drawImage(bowlImg, bx, by, BW, BH); ctx.restore();
    // 分享卡專用擺盤：比遊戲內 MOUND 更散開（不糊成一坨），沿冰丘排成弧形，
    // 每顆帶落地陰影＋些微轉角，看起來像一顆顆料而不是一坨。前排（y 較大）最後畫，自然疊在上面。
    const CARD_POS=[[26,49],[41,38],[59,38],[74,49],[50,57]];
    const CARD_ROT=[-13,9,-7,14,2];
    const tsize=76;
    for(let i=0;i<state.must.length;i++){
      const art=ART[state.must[i]]; if(!art) continue;
      const [mxp,myp]=CARD_POS[i]||[50,50];
      const ccx=bx+mxp/100*BW, ccy=by+myp/100*BH;
      const ti=await svgToImage(art, tsize*2, tsize*2);
      ctx.save();
      ctx.shadowColor="rgba(60,45,25,.28)"; ctx.shadowBlur=9; ctx.shadowOffsetY=5;
      ctx.translate(ccx,ccy); ctx.rotate(CARD_ROT[i]*Math.PI/180);
      ctx.drawImage(ti, -tsize/2, -tsize/2, tsize, tsize);
      ctx.restore();
    }
  }catch(e){}
  let y=by+BH+118;
  ctx.fillStyle="#3c372e"; ctx.font='700 92px "LXGW WenKai TC","Noto Serif TC",serif'; ctx.fillText(p.name, cx, y);
  y+=76; ctx.fillStyle="#b45c3f"; ctx.font='400 40px "Noto Sans TC",sans-serif'; ctx.fillText("「"+p.tagline+"」", cx, y);
  y+=62; ctx.fillStyle="#8b8171"; ctx.font='700 34px "Noto Sans TC",sans-serif'; ctx.fillText("隱藏標籤 × "+s.name, cx, y);
  // code chip
  y+=54; const chipW=440, chipH=120, chipX=cx-chipW/2;
  ctx.fillStyle="#fbf7ef"; ctx.strokeStyle="rgba(60,55,46,.18)"; ctx.lineWidth=2; roundRect(ctx,chipX,y,chipW,chipH,18); ctx.fill(); ctx.stroke();
  ctx.fillStyle="#8b8171"; ctx.font='700 26px "Noto Sans TC",sans-serif'; ctx.fillText("刨 冰 代 碼", cx, y+44);
  ctx.fillStyle="#b45c3f"; ctx.font='800 60px ui-monospace,Menlo,monospace'; ctx.fillText(code, cx, y+104);
  y+=chipH+66; ctx.fillStyle="#3c372e"; ctx.font='700 36px "Noto Sans TC",sans-serif'; ctx.fillText("來測你的刨冰人格 🍧", cx, y);
  return await new Promise(res=>cv.toBlob(res,"image/png"));
}

/* ============ 雙人契合度 ============ */
const COMPAT={
  soul:{name:"靈魂伴侶", range:"必吃重疊 4–5 樣",
    desc:"你們的口味幾乎一致。各自一碗擺在一起，也像同一碗。這種同步很難得，好好珍惜。"},
  complement:{name:"完美互補", range:"必吃重疊 2–3 樣",
    desc:"你們有一部分口味相同，也各自保有堅持。各自一碗、偶爾交換一口，有共識又不無聊，剛剛好。"},
  solo:{name:"各自美麗", range:"必吃重疊 0–1 樣",
    desc:"你們的口味很不一樣，但這不是問題。各自點一碗、各自喜歡，偶爾交換一口，反而能一起吃到更多。"},
};
const compatLevel=n=> n>=4?COMPAT.soul : n>=2?COMPAT.complement : COMPAT.solo;

function mountCompat(){
  app.innerHTML=`
    <header class="mast">
      <div class="mast-kicker">雙 人 契 合 度</div>
      <h1 class="mast-title">你們，合吃一碗嗎？</h1>
      <div class="mast-rule"><span class="seal-mark">冰</span></div>
    </header>
    <div class="result">
      <p class="res-desc" style="text-align:center">輸入另一半的「刨冰代碼」，<br>看看你們一起吃這碗冰有多合拍。</p>
      <div class="code-input">
        <input id="codeIn" type="text" placeholder="XXXXXX" autocomplete="off" autocapitalize="characters" maxlength="6">
        <div class="code-err" id="err"></div>
      </div>
      <div class="res-actions">
        <button class="wc-cta ready" id="go">看契合度 →</button>
        <button class="ghost-btn small" id="back">← 回我的結果</button>
      </div>
    </div>`;
  const inp=document.getElementById("codeIn"), err=document.getElementById("err");
  inp.oninput=()=>{ err.textContent=""; };
  const submit=()=>{
    const partner=decodeCode(inp.value);
    if(!partner){ err.textContent="這個代碼看起來怪怪的，再確認一下唷～"; inp.classList.add("shake"); setTimeout(()=>inp.classList.remove("shake"),400); return; }
    mountCompatResult(partner); window.scrollTo(0,0);
  };
  document.getElementById("go").onclick=submit;
  inp.onkeydown=e=>{ if(e.key==="Enter") submit(); };
  document.getElementById("back").onclick=()=>{ state.screen="result"; render(); window.scrollTo(0,0); };
  inp.focus();
}
function mountCompatResult(partner){
  const shared=state.must.filter(id=>partner.must.includes(id));
  const n=shared.length, lvl=compatLevel(n);
  const mine=mainPersona(state.must), theirs=mainPersona(partner.must);
  // 代碼帶了必吃＋拒吃 → 地雷可雙向看
  const theirFavMyBan=[...new Set(partner.must.filter(id=>state.ban.includes(id)))];        // 對方的最愛在你的地雷
  const myFavTheirBan=[...new Set(state.must.filter(id=>(partner.ban||[]).includes(id)))];  // 你的最愛在對方的地雷
  const meter=`${"●".repeat(n)}${"○".repeat(5-n)}<b>${n} / 5</b>`;
  const sharedBlock = n
    ? `<div class="res-summary"><div class="rs-row"><span class="rs-k" style="color:var(--accent)">共同</span>${miniList(shared)}</div></div>`
    : `<div class="res-subdesc" style="text-align:center">你們沒有相同的必吃配料。各自點一碗，加起來能一起吃到的更多 🍧</div>`;
  const lm=[];
  if(theirFavMyBan.length) lm.push(`${theirFavMyBan.map(id=>byId(id).name).join("、")} 是對方的最愛，卻在你的地雷名單上`);
  if(myFavTheirBan.length) lm.push(`${myFavTheirBan.map(id=>byId(id).name).join("、")} 是你的最愛，卻在對方的地雷名單上`);
  const landmineBlock = lm.length
    ? `<div class="landmine"><b>貼心提醒</b>　${lm.join("；")}。剛好各自一碗，誰都不用勉強自己 😌</div>`
    : "";
  app.innerHTML=`
    <header class="mast">
      <div class="mast-kicker">雙 人 契 合 度</div>
      <div class="mast-rule"><span class="seal-mark">冰</span></div>
    </header>
    <div class="result">
      <div class="compat-hero">
        <div class="ch-bowls">
          <div class="chb"><div class="chb-bowl">${bowlWithToppings(state.must)}</div><span>${mine.name}</span></div>
          <div class="chb-vs">×</div>
          <div class="chb"><div class="chb-bowl">${bowlWithToppings(partner.must)}</div><span>${theirs.name}</span></div>
        </div>
        <div class="ch-level">${lvl.name}</div>
        <div class="ch-range">${lvl.range}</div>
        <div class="ch-meter">${meter}</div>
      </div>
      <p class="res-desc" style="text-align:center">${lvl.desc}</p>
      ${sharedBlock}
      ${landmineBlock}
      <div class="res-actions">
        <button class="wc-cta ready" id="shareCompat">分享我們的契合度 🍧</button>
        <button class="ghost-btn" id="again">換一個代碼再測</button>
      </div>
      <button class="ghost-btn small" id="back">← 回我的結果</button>
    </div>`;
  document.getElementById("shareCompat").onclick=(e)=>shareCompatResult(lvl, n, e.currentTarget);
  document.getElementById("again").onclick=()=>{ state.screen="compat"; render(); window.scrollTo(0,0); };
  document.getElementById("back").onclick=()=>{ state.screen="result"; render(); window.scrollTo(0,0); };
}
async function shareCompatResult(lvl, n, btn){
  const orig=btn.textContent;
  const url = /^https?:/.test(location.origin) ? location.href.split("#")[0] : "";
  const text = `我們的刨冰契合度是「${lvl.name}」，必吃重疊 ${n}/5 🍧 來測你們的～`;
  if(navigator.share){
    try{ await navigator.share(url?{title:"刨冰人格測驗",text,url}:{title:"刨冰人格測驗",text}); return; }
    catch(err){ if(err && err.name==="AbortError") return; }
  }
  copyText(url?`${text} ${url}`:text, btn, orig, "已複製，貼給對方 ✓");
}

render();
</script>
